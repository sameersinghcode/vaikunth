<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Contact — Vaikunth</title><meta name="description" content="Speak directly with the Vaikunth family. WhatsApp, email or visit us in Karnal, Haryana.">
<link rel="stylesheet" href="style.css"></head><body>
<div class="announce" id="announce"></div><nav id="nav"></nav>
<section><div class="wrap">
  <div class="sec-head"><div class="eyebrow">Contact</div><h2>Speak With the Family</h2>
    <p>Every conversation is with us directly. Tell us about your home.</p></div>
  <div class="contact-grid">
    <div class="rv" id="c-info"></div>
    <form class="rv" id="c-form">
      <div><label>Your Name</label><input name="name" required></div>
      <div><label>Phone</label><input name="phone" required></div>
      <div><label>Message</label><textarea name="message" rows="5" required placeholder="Which piece caught your eye? What space is it for?"></textarea></div>
      <button class="btn" type="submit" style="border:none;cursor:pointer;font-family:var(--body)">Send Message</button>
    </form>
  </div>
</div></section>
<footer id="footer"></footer>
<script src="config.js"></script><script src="app.js"></script><script>boot("contact")</script>
</body></html>
